<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>muzwt</title>
    <link rel="stylesheet" href="src/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playpen+Sans:wght@100..800&family=Playwrite+NZ+Basic:wght@100..400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bio-background">
        <video id="videoBG" loop muted>
            <source src="src/video/bg.mp4" type="video/mp4">
        </video>
    </div>
    <div id="container" class="container">
        <div id="profile-container" class="profile-container">
            <div class="bio-profile">
                <div class="bio-head">
                    <img class="bio-icon" src="src/img/pfp.jpg">
                    <div class="bio-info">
                        <h1>muzwt</h1>
                        <p id="description"></p>
                    </div>
                </div>
            </div>
            <div class="bio-buttons">
                <div class="left">
                    <button onclick="openLink('tg')">Telegram</button>
                    <button onclick="openLink('gh')">GitHub</button>
                </div>
                <div class="right">
                    <button onclick="openLink('donate')">Donate 🙏</button>
                </div>
            </div>
        </div>
    </div>
    <div onclick="start()" id="overlay" class="overlay">
        <p id="overlayText"></p>
    </div>
    <script src="src/script.js"></script>
</body>
</html>
